services:
  client:
    build: ./client
    environment:
      - RESOLVER_IP=10.20.0.53
      - ROUNDS=${ROUNDS:-50}
    networks:
      dnsnet:
        ipv4_address: 10.20.0.10

  resolver:
    build: ./resolver
    environment:
      - PYTHONUNBUFFERED=1
      - RESOLVER_BIND_IP=10.20.0.53
      - UPSTREAM_DNS_IP=10.20.0.100
      - UPSTREAM_FIXED_SRC_PORT=${UPSTREAM_FIXED_SRC_PORT:-0}
      - TXID_SPACE=${TXID_SPACE:-65536}
      - DEFENSE_MODE=${DEFENSE_MODE:-off}
      - ATTACK_RATE=${ATTACK_RATE:-0.03}
      - POISON_IP=${POISON_IP:-6.6.6.6}
    networks:
      dnsnet:
        ipv4_address: 10.20.0.53

  auth:
    build: ./auth
    environment:
      - PYTHONUNBUFFERED=1
      - AUTH_DELAY_SECONDS=${AUTH_DELAY:-0.25}
    networks:
      dnsnet:
        ipv4_address: 10.20.0.100

  attacker:
    build: ./attacker
    environment:
      - PYTHONUNBUFFERED=1
      - RESOLVER_IP=10.20.0.53
      - AUTH_IP=10.20.0.100
      - RESOLVER_UPSTREAM_PORT=${RESOLVER_UPSTREAM_PORT:-33333}
      - SRC_PORT_START=${SRC_PORT_START:-}
      - SRC_PORT_END=${SRC_PORT_END:-}
      - SRC_PORT_SCAN_LIMIT=${SRC_PORT_SCAN_LIMIT:-}
      - TXID_SPACE=${TXID_SPACE:-65536}
      - TXID_SCAN_LIMIT=${TXID_SCAN_LIMIT:-4096}
      - PACKET_CHUNK_SIZE=${PACKET_CHUNK_SIZE:-512}
      - ATTACK_RATE=${ATTACK_RATE:-0.03}
      - POISON_IP=${POISON_IP:-6.6.6.6}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      dnsnet:
        ipv4_address: 10.20.0.200

networks:
  dnsnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24
